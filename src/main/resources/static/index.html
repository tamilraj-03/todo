<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow — Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0f;
      --surface:     #111118;
      --surface2:    #18181f;
      --border:      rgba(255,255,255,0.07);
      --border2:     rgba(255,255,255,0.12);
      --accent:      #7c6aff;
      --accent2:     #a78bfa;
      --accent-glow: rgba(124,106,255,0.25);
      --text:        #f0eeff;
      --text2:       #9b93c2;
      --text3:       #5a5470;
      --green:       #34d399;
      --green-bg:    rgba(52,211,153,0.1);
      --red:         #f87171;
      --red-bg:      rgba(248,113,113,0.08);
      --radius:      14px;
      --radius-sm:   8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(124,106,255,0.15) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    body { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px; min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 32px 20px;
      position: sticky; top: 0; height: 100vh;
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 48px; padding: 0 8px;
    }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: white;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .logo span {
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
    }
    .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      color: var(--text2); font-size: 14px;
      text-decoration: none; cursor: pointer;
      transition: all 0.2s ease;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: rgba(124,106,255,0.12);
      color: var(--accent2); font-weight: 500;
    }
    .nav-count {
      margin-left: auto;
      background: var(--surface2); color: var(--text3);
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      border: 1px solid var(--border);
    }
    .nav-item.active .nav-count {
      background: rgba(124,106,255,0.2);
      color: var(--accent2);
      border-color: rgba(124,106,255,0.3);
    }
    .sidebar-footer {
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--text3);
      margin-bottom: 10px; font-weight: 500;
    }
    .progress-bar {
      height: 4px; border-radius: 4px;
      background: var(--surface2); overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* ── Main ── */
    .main {
      flex: 1; padding: 40px 48px;
      max-width: 860px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 36px;
    }
    .greeting {
      font-size: 12px; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .page-title {
      font-size: 36px; font-weight: 800;
      letter-spacing: -0.03em; color: var(--text);
      line-height: 1.1;
    }
    .date-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 13px; color: var(--text2);
      font-weight: 500; margin-top: 6px;
    }

    /* ── Add Task ── */
    .add-task-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 6px; margin-bottom: 32px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .add-task-card:focus-within {
      border-color: rgba(124,106,255,0.5);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.08),
                  0 0 20px rgba(124,106,255,0.08);
    }
    .add-task-inner {
      display: flex; align-items: center;
      gap: 12px; padding: 8px 16px;
    }
    .add-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: rgba(124,106,255,0.12);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent2); flex-shrink: 0;
    }
    #todoInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 15px; font-weight: 300;
      caret-color: var(--accent);
    }
    #todoInput::placeholder { color: var(--text3); }
    .add-btn {
      padding: 9px 22px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 16px rgba(124,106,255,0.3);
      white-space: nowrap;
    }
    .add-btn:hover {
      background: #6b59ef;
      box-shadow: 0 0 24px rgba(124,106,255,0.5);
      transform: translateY(-1px);
    }

    /* ── Section Header ── */
    .section-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px; padding: 0 4px;
    }
    .section-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text3);
    }
    .task-meta { font-size: 12px; color: var(--text3); }

    /* ── Todo List ── */
    .todo-list { display: flex; flex-direction: column; gap: 8px; list-style: none; }

    .todo-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.2s ease;
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .todo-item:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateX(3px);
    }
    .todo-item.completed { opacity: 0.55; }

    /* Checkbox */
    .custom-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.2s ease; background: transparent;
    }
    .custom-check:hover {
      border-color: var(--accent);
      background: rgba(124,106,255,0.08);
    }
    .custom-check.checked {
      background: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 10px rgba(124,106,255,0.4);
    }
    .custom-check svg { display: none; width: 11px; height: 11px; stroke: white; stroke-width: 3; }
    .custom-check.checked svg { display: block; }

    .todo-title {
      flex: 1; font-size: 14px; color: var(--text);
      transition: color 0.2s;
    }
    .todo-title.done {
      text-decoration: line-through; color: var(--text3);
    }

    .todo-tag {
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 20px;
    }
    .tag-pending {
      background: rgba(251,191,36,0.1); color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.2);
    }
    .tag-done {
      background: var(--green-bg); color: var(--green);
      border: 1px solid rgba(52,211,153,0.2);
    }

    .del-btn {
      width: 30px; height: 30px; border-radius: 8px;
      background: transparent; border: 1px solid transparent;
      color: var(--text3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; opacity: 0; flex-shrink: 0;
    }
    .todo-item:hover .del-btn { opacity: 1; }
    .del-btn:hover {
      background: var(--red-bg);
      border-color: rgba(248,113,113,0.2);
      color: var(--red);
    }
    .del-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; color: var(--text3);
    }
    .empty-title {
      font-size: 18px; font-weight: 700;
      color: var(--text2); margin-bottom: 6px;
    }
    .empty-sub { font-size: 13px; color: var(--text3); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 24px 20px; }
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">T</div>
      <span>Taskflow</span>
    </div>
    <nav class="nav">
      <a href="#" class="nav-item active" onclick="filterTodos('all', this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        All Tasks
        <span class="nav-count" id="count-all">0</span>
      </a>
      <a href="#" class="nav-item" onclick="filterTodos('pending', this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Pending
        <span class="nav-count" id="count-pending">0</span>
      </a>
      <a href="#" class="nav-item" onclick="filterTodos('done', this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Completed
        <span class="nav-count" id="count-done">0</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="progress-label">
        <span>Today's Progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <div class="greeting" id="greeting">Good morning</div>
        <h1 class="page-title">My Tasks</h1>
      </div>
      <div class="header-right">
        <div class="date-badge" id="date-badge"></div>
      </div>
    </header>

    <div class="add-task-card">
      <div class="add-task-inner">
        <div class="add-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
        <input type="text" id="todoInput"
               placeholder="Add a new task and press Enter..."
               autocomplete="off"/>
        <button class="add-btn" onclick="addTodo()">Add Task</button>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title" id="section-label">All Tasks</span>
      <span class="task-meta" id="task-meta">0 tasks</span>
    </div>

    <ul id="todoList" class="todo-list"></ul>

    <div id="empty" class="empty-state" style="display:none">
      <div class="empty-icon">
        <svg width="40" height="40" fill="none" stroke="currentColor"
             stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
        </svg>
      </div>
      <p class="empty-title">No tasks here</p>
      <p class="empty-sub">Add your first task above to get started</p>
    </div>
  </main>

  <script>
    const API = "https://todo-production-a06c.up.railway.app/todo";
    let allTodos = [];
    let currentFilter = "all";

    window.onload = function () {
      setGreeting();
      setDate();
      loadTodos();
      document.getElementById("todoInput").addEventListener("keypress", function (e) {
        if (e.key === "Enter") addTodo();
      });
    };

    function setGreeting() {
      const h = new Date().getHours();
      const g = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
      document.getElementById("greeting").textContent = g;
    }

    function setDate() {
      const now = new Date();
      const opts = { weekday: 'short', month: 'short', day: 'numeric' };
      document.getElementById("date-badge").textContent =
        now.toLocaleDateString('en-US', opts);
    }

    function loadTodos() {
      fetch(API)
        .then(res => res.json())
        .then(todos => {
          allTodos = todos;
          updateCounts();
          renderTodos();
        })
        .catch(() => renderTodos());
    }

    function updateCounts() {
      const total   = allTodos.length;
      const done    = allTodos.filter(t => t.completed).length;
      const pending = total - done;
      document.getElementById("count-all").textContent     = total;
      document.getElementById("count-pending").textContent = pending;
      document.getElementById("count-done").textContent    = done;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById("progress-pct").textContent  = pct + "%";
      document.getElementById("progress-fill").style.width = pct + "%";
    }

    function renderTodos() {
      const list  = document.getElementById("todoList");
      const empty = document.getElementById("empty");
      const meta  = document.getElementById("task-meta");
      const label = document.getElementById("section-label");

      let filtered = allTodos;
      if (currentFilter === "pending") filtered = allTodos.filter(t => !t.completed);
      if (currentFilter === "done")    filtered = allTodos.filter(t => t.completed);

      const labels = { all: "All Tasks", pending: "Pending", done: "Completed" };
      label.textContent = labels[currentFilter];
      meta.textContent  = filtered.length + " task" + (filtered.length !== 1 ? "s" : "");

      list.innerHTML = "";

      if (filtered.length === 0) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      filtered.forEach((todo, i) => {
        const li = document.createElement("li");
        li.className = "todo-item" + (todo.completed ? " completed" : "");
        li.style.animationDelay = (i * 0.04) + "s";
        li.innerHTML = `
          <div class="custom-check ${todo.completed ? 'checked' : ''}"
               onclick="toggleTodo(${todo.id}, ${todo.completed}, '${escHtml(todo.title)}')">
            <svg viewBox="0 0 12 12" fill="none">
              <polyline points="1.5 6 4.5 9 10.5 3"/>
            </svg>
          </div>
          <span class="todo-title ${todo.completed ? 'done' : ''}">${escHtml(todo.title)}</span>
          <span class="todo-tag ${todo.completed ? 'tag-done' : 'tag-pending'}">
            ${todo.completed ? 'Done' : 'Pending'}
          </span>
          <button class="del-btn" onclick="deleteTodo(${todo.id})" title="Delete">
            <svg viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        `;
        list.appendChild(li);
      });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById("todoInput");
      const title = input.value.trim();
      if (!title) { input.focus(); return; }
      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: title, completed: false })
      })
      .then(res => res.json())
      .then(() => { input.value = ""; loadTodos(); });
    }

    function deleteTodo(id) {
      fetch(`${API}/${id}`, { method: "DELETE" }).then(() => loadTodos());
    }

    function toggleTodo(id, completed, title) {
      fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: title, completed: !completed })
      }).then(() => loadTodos());
    }

    function filterTodos(type, el) {
      currentFilter = type;
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      if (el) el.classList.add("active");
      renderTodos();
    }
  </script>
</body>
</html>
